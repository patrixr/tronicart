<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Raytracing with WASM</title>
</head>
<body>
    <h1>Hello</h1>
    <div class="img-container">
        <canvas id="output-canvas" width="1200" height="675" style="outline: 1px dashed black"></canvas>
    </div>
    <script src="wasm_exec.js"></script>
    <script>
        config = {
            "aspectRatio": {
                "w": 16,
                "h": 9
            },
            "size": 300,
            "threads": 1,
            "camera": {
                "defocusAngle": 0,
                "focusDist": 1,
                "vfov": 70,
                "vup": {
                    "x": 0,
                    "y": 1,
                    "z": 0
                },
                "lookAt": {
                    "x": 0,
                    "y": 0,
                    "z": -1
                },
                "lookFrom": {
                    "x": 0,
                    "y": 0,
                    "z": 1
                }
            },
            "antialiasing": {
                "samples": 5
            },
            "viewport": {
                "size": 2
            },
            "objects": [
                {
                    "type": "sphere",
                    "radius": 100,
                    "center": {
                        "x": 0,
                        "y": -100.5,
                        "z": -1
                    },
                    "material": "matte",
                    "color": {
                        "r": 204,
                        "g": 213,
                        "b": 174,
                        "a": 255
                    }
                },
                {
                    "type": "sphere",
                    "radius": 0.5,
                    "center": {
                        "x": 0,
                        "y": 0,
                        "z": -1
                    },
                    "material": "metal",
                    "color": {
                        "r": 204,
                        "g": 204,
                        "b": 204,
                        "a": 255
                    }
                }
            ]
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("raytracer.wasm"), go.importObject).then((result) => {
            go.run(result.instance);

            RT.renderFromJson(JSON.stringify(config), (res) => {
                const {Bytes, Width, Height, Status} = res;
                const canvas = document.getElementById("output-canvas");

                if (Status !== "done") {
                    console.error(res);
                    return;
                }

                const imageData = new ImageData(new Uint8ClampedArray(Bytes), Width, Height);
                canvas.width = Width;
                canvas.height = Height;
                canvas.getContext('2d').putImageData(imageData, 0, 0);
            });
        })
    </script>
</body>
</html>
